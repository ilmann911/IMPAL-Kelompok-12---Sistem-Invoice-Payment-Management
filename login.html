<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invopay - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Akatab:wght@400;800&family=Alexandria:wght@300;600&family=Inter:wght@500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Alexandria', sans-serif;
            background: #FFFFFF;
            display: flex;
            min-height: 100vh;
        }

        /* LEFT SIDE - BRANDING */
        .left-panel {
            flex: 1;
            background: linear-gradient(180deg, #0080FF 0%, #6CA5E9 100%);
            position: relative;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #FFFFFF;
            overflow: hidden;
            max-width: 50%;
        }

        /* Dekorasi Vector (Opsional, disesuaikan dari desain) */
        .vector-deco-1 {
            position: absolute;
            width: 872px;
            height: 187px;
            left: -50px;
            top: 500px;
            border: 5px solid rgba(255, 255, 255, 0.5);
            transform: rotate(-18deg);
            pointer-events: none;
        }

        .logo {
            width: 150px; /* Sesuaikan ukuran logo asli */
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0px 4px 4px rgba(0, 0, 0, 0.25));
        }

        h1.title {
            font-family: 'Akatab', sans-serif;
            font-weight: 800;
            font-size: 32px;
            line-height: 1.2;
            margin-bottom: 50px;
            text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.1);
        }

        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .feature-icon {
            width: 61px;
            height: 61px;
            background: #27639F;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feature-icon svg {
            fill: #FFFFFF;
            width: 30px;
            height: 30px;
        }

        .feature-text h3 {
            font-family: 'Akatab', sans-serif;
            font-weight: 800;
            font-size: 20px;
            text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.1);
            margin-bottom: 4px;
        }

        .feature-text p {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
        }

        /* RIGHT SIDE - LOGIN FORM */
        .right-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .login-card {
            width: 492px;
            background: rgba(238, 239, 243, 0.2);
            border: 1px solid rgba(102, 102, 102, 0.3);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.1);
            border-radius: 50px;
            padding: 50px 60px;
        }

        .login-card h2 {
            font-weight: 600;
            font-size: 40px;
            margin-bottom: 10px;
            color: #000000;
        }

        .login-card > p {
            font-weight: 300;
            font-size: 16px;
            color: #555;
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            height: 44px;
            background: #F1F1F1;
            border: 1px solid #97A0AF;
            border-radius: 10px;
            padding: 0 45px;
            font-family: 'Akatab', sans-serif;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-wrapper input:focus {
            border-color: #1B69B6;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            width: 20px;
            height: 20px;
            fill: #97A0AF;
        }

        .eye-icon {
            position: absolute;
            right: 15px;
            width: 20px;
            height: 20px;
            fill: #97A0AF;
            cursor: pointer;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            border: 1px solid #97A0AF;
            border-radius: 5px;
        }

        .remember-me label {
            font-weight: 300;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            height: 54px;
            background: #1B69B6;
            border: none;
            border-radius: 10px;
            color: #FFFFFF;
            font-family: 'Alexandria', sans-serif;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #144e8a;
        }

    </style>
</head>
<body>

    <div class="left-panel">
        <div class="vector-deco-1"></div>
        
        <img src="INVOPAY.png" alt="Invopay Logo" class="logo" onerror="this.style.display='none'"> 
        
        <h1 class="title">Invoice System &<br>Payment Management</h1>
        
        <div class="feature-list">
            <div class="feature-item">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 14H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                </div>
                <div class="feature-text">
                    <h3>Kelola Invoice</h3>
                    <p>Buat dan kelola invoice dengan mudah</p>
                </div>
            </div>

            <div class="feature-item">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
                </div>
                <div class="feature-text">
                    <h3>Pantau Pembayaran</h3>
                    <p>Verifikasi dan lacak pembayaran</p>
                </div>
            </div>

            <div class="feature-item">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
                </div>
                <div class="feature-text">
                    <h3>Laporan & Rekap</h3>
                    <p>Lihat laporan keuangan secara lengkap</p>
                </div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="login-card">
            <h2>Welcome!</h2>
            <p>Login untuk mengakses dashboard</p>

            <form action="#">
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                        <input type="email" placeholder="admin@invopay.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6-5c1.66 0 3 1.34 3 3v2H9V6c0-1.66 1.34-3 3-3z"/></svg>
                        <input type="password" placeholder="Masukkan password" required>
                        <svg class="eye-icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    </div>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember">Ingat saya</label>
                </div>

                <button type="submit" class="btn-login">Login</button>
            </form>
        </div>
    </div>

</body>
</html>
